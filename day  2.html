<html>
    <head>
        <body bgcolor="lightgreen">
            <fieldset>
                <legend><h2 style="color:red;">USERS FORM</h2></legend>
                <form="get"></form>
            <table>
                <tr>
                    <td>
                        <lable>FIRST NAME</lable>
                    </td>
                    <td>
                        <input type="txtname" value=""/>
                    </td>
                </tr>
                <tr>
                    <td>
                        <lable>PASSWORD</lable>
                    </td>
                    <td>
                        <input type="password" value=""/>
                    </td>
                </tr>
                <tr>
                    <td>
                        <lable>GENDER</lable>
                    </td>
                    <td>
                        <input type="radio" value="Male" name="gender"/> <lable>Male</lable>
                        <input type="radio" value="Female" name="gender"/> <lable>Female</lable>
                    </td>
                </tr>
                <tr>
                    <td>
                    <lable>ADDRESS</lable>
                    </td>
                    <td>
                        <textarea name="txtaddress" cols="100" rowa="90"></textarea>
                    </td>
                </tr>
                <tr>
                    <td>
                        <lable>D.O.B</lable>
                    </td>
                    <td>
                        <input type="date" value=""/>
                    </td>
                </tr>
                <tr>
                    <td>
                        <lable>SELECT GAMES</lable>
                    </td>
                    <td>
                        <input type="checkbox" value="Hockey" name="select games"/> <lable>Hockey</lable>
                        <input type="checkbox" value="Footboll" name="select games"/> <lable>Footboll</lable>
                        <input type="checkbox" value="Cricket" name="select games"/> <lable>Cricket</lable>
                        <input type="checkbox" value="Volleyboll" name="select games"/> <lable>Volleyboll</lable>
                    </td>
                </tr>
                <tr>
                    <td>
                        <lable>MARITAL STATUS</lable>
                    </td>
                    <td>
                        <input type="radio" value="Married" name="select games"/> <lable>Married</lable>
                        <input type="radio" value="Unmarried" name="select games"/> <lable>Unmarried</lable>
                        <tr>
                            <td colspan="2" align="center">
                                <input type="Submit" value="Submit"/>
                                <input type="Reset" value="reset"/>
                            </td>
                </tr>
            </table>
            </fieldset>
        </body>
    </head>
</html>
